<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - CMA Actes 1:8</title>
    <style>
        :root { --primary: #0056b3; --bg: #f4f6f9; --text: #333; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 700px; margin: 30px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; padding: 15px; background: #fafafa; border-radius: 8px; border-left: 4px solid var(--primary); }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        textarea, input[type="text"], input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        textarea { min-height: 80px; resize: vertical; }
        .preview-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .preview { max-height: 100px; border-radius: 6px; border: 1px solid #ddd; padding: 4px; object-fit: cover; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        .status { margin-top: 15px; padding: 10px; text-align: center; border-radius: 6px; display: none; font-weight: bold; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ Panneau Administrateur</h1>
        <div id="statusMessage" class="status success"></div>

        <form id="adminForm">
            <div class="form-group">
                <label>Logo de l'Église :</label>
                <input type="file" id="logoFile" accept="image/*">
                <div class="preview-container"><img id="logoPreview" class="preview" style="display:none;"></div>
            </div>

            <div class="form-group">
                <label>Photos du Carrousel (Sélectionnez plusieurs images d'un coup) :</label>
                <input type="file" id="carouselFiles" accept="image/*" multiple>
                <div id="carouselPreviews" class="preview-container"></div>
            </div>

            <div class="form-group">
                <label for="texteAccueil">Texte d'accueil principal :</label>
                <textarea id="texteAccueil"></textarea>
            </div>

            <div class="form-group">
                <label for="vieEgliseTexte">Section "Vie de l'Église" :</label>
                <textarea id="vieEgliseTexte"></textarea>
            </div>

            <div class="form-group">
                <label for="lienYouTube">Lien du Direct YouTube :</label>
                <input type="text" id="lienYouTube" placeholder="https://www.youtube.com/embed/...">
            </div>

            <div class="form-group">
                <label for="lienFacebook">Lien de la Page Facebook :</label>
                <input type="text" id="lienFacebook" placeholder="https://facebook.com/votre-page">
            </div>

            <div class="form-group">
                <label for="coordonneesBancaires">Coordonnées Bancaires :</label>
                <textarea id="coordonneesBancaires"></textarea>
            </div>

            <div class="form-group">
                <label for="mobileMoney">Numéros Mobile Money :</label>
                <textarea id="mobileMoney"></textarea>
            </div>

            <button type="submit" class="btn">Enregistrer et Mettre à jour</button>
        </form>
    </div>

    <script>
        const statusDiv = document.getElementById('statusMessage');
        let currentLogoSrc = "";
        let currentCarouselImages = [];

        document.getElementById('logoFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (el) => {
                    document.getElementById('logoPreview').src = el.target.result;
                    document.getElementById('logoPreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('carouselFiles').addEventListener('change', function(e) {
            const container = document.getElementById('carouselPreviews');
            container.innerHTML = "";
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (el) => {
                    const img = document.createElement('img');
                    img.src = el.target.result;
                    img.className = 'preview';
                    container.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });

        async function loadCurrentData() {
            try {
                const res = await fetch('/api/data?t=' + Date.now());
                const data = await res.json();
                if(data) {
                    document.getElementById('texteAccueil').value = data.texteAccueil || '';
                    document.getElementById('vieEgliseTexte').value = data.vieEgliseTexte || '';
                    document.getElementById('lienYouTube').value = data.lienYouTube || '';
                    document.getElementById('lienFacebook').value = data.lienFacebook || '';
                    document.getElementById('coordonneesBancaires').value = data.coordonneesBancaires || '';
                    document.getElementById('mobileMoney').value = data.mobileMoney || '';
                    
                    if (data.logoSrc) {
                        document.getElementById('logoPreview').src = data.logoSrc;
                        document.getElementById('logoPreview').style.display = 'block';
                        currentLogoSrc = data.logoSrc;
                    }
                    if (data.carouselImages) {
                        currentCarouselImages = data.carouselImages;
                        const container = document.getElementById('carouselPreviews');
                        container.innerHTML = "";
                        currentCarouselImages.forEach(src => {
                            const img = document.createElement('img');
                            img.src = src;
                            img.className = 'preview';
                            container.appendChild(img);
                        });
                    }
                }
            } catch (err) {}
        }

        function showStatus(msg) {
            statusDiv.textContent = msg;
            statusDiv.style.display = 'block';
            window.scrollTo(0, 0);
        }

        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            showStatus("Mise à jour en cours...");
            
            try {
                if (document.getElementById('logoFile').files.length > 0) {
                    const formData = new FormData();
                    formData.append('logoFile', document.getElementById('logoFile').files[0]);
                    const res = await fetch('/api/upload-logo', { method: 'POST', body: formData });
                    const resData = await res.json();
                    if (resData.src) currentLogoSrc = resData.src;
                }

                const carouselInput = document.getElementById('carouselFiles');
                if (carouselInput.files.length > 0) {
                    const formData = new FormData();
                    Array.from(carouselInput.files).forEach(file => {
                        formData.append('carouselFiles', file);
                    });
                    const res = await fetch('/api/upload-carousel', { method: 'POST', body: formData });
                    const resData = await res.json();
                    if (resData.srcs) currentCarouselImages = resData.srcs;
                }

                const payload = {
                    logoSrc: currentLogoSrc,
                    carouselImages: currentCarouselImages,
                    texteAccueil: document.getElementById('texteAccueil').value,
                    vieEgliseTexte: document.getElementById('vieEgliseTexte').value,
                    lienYouTube: document.getElementById('lienYouTube').value,
                    lienFacebook: document.getElementById('lienFacebook').value,
                    coordonneesBancaires: document.getElementById('coordonneesBancaires').value,
                    mobileMoney: document.getElementById('mobileMoney').value
                };

                await fetch('/api/save-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                showStatus("Enregistrement réussi !");
                loadCurrentData();
            } catch (err) {
                showStatus("Erreur lors de la sauvegarde.");
            }
        });

        window.onload = loadCurrentData;
    </script>
</body>
</html>
