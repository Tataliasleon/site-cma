<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panneau Admin - CMA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

<div class="admin-container">
    <div class="admin-header">
        <div class="admin-logo-box">
            <img id="logoPreview" src="" alt="Logo Église" style="display: none; max-height: 90px; margin: 0 auto 15px auto;">
        </div>
        <h1>⚙️ Panneau d'Administration</h1>
        <p>Centre Missionnaire Actes 1:8</p>
    </div>
    
    <div id="statusMessage" class="status-msg"></div>

    <form id="adminForm">
        <div class="form-section">
            <h2>1. Identité visuelle</h2>
            <div class="form-group">
                <label>Changer le logo de l'église :</label>
                <input type="file" id="logoFile" accept="image/*">
            </div>
        </div>

        <div class="form-section">
            <h2>2. Galerie d'images défilantes (Carrousel)</h2>
            <div class="form-group">
                <label>Sélectionnez plusieurs photos en même temps :</label>
                <input type="file" id="carouselFiles" accept="image/*" multiple name="carouselFiles">
                <div id="carouselPreview" class="gallery-preview"></div>
            </div>
        </div>

        <div class="form-section">
            <h2>3. Contenus Textuels</h2>
            <div class="form-group">
                <label>Grand titre d'accueil :</label>
                <input type="text" id="texteAccueil">
            </div>
            <div class="form-group">
                <label>Présentation de l'Église (Vie de l'Église) :</label>
                <textarea id="vieEgliseTexte"></textarea>
            </div>
        </div>

        <div class="form-section">
            <h2>4. Réseaux Sociaux & Directs</h2>
            <div class="form-group">
                <label>Lien d'intégration Direct YouTube (URL embed) :</label>
                <input type="text" id="lienYouTube" placeholder="https://www.youtube.com/embed/...">
            </div>
            <div class="form-group">
                <label>Lien complet de la page Facebook :</label>
                <input type="text" id="lienFacebook" placeholder="https://facebook.com/...">
            </div>
        </div>

        <div class="form-section">
            <h2>5. Coordonnées pour les Dons</h2>
            <div class="form-group">
                <label>Informations bancaires :</label>
                <textarea id="coordonneesBancaires"></textarea>
            </div>
            <div class="form-group">
                <label>Comptes Mobile Money :</label>
                <textarea id="mobileMoney"></textarea>
            </div>
        </div>

        <button type="submit" class="btn-submit">💾 Sauvegarder et mettre le site à jour</button>
    </form>
</div>

<script>
    let currentLogoSrc = "";
    let currentCarouselImages = [];

    const logoInput = document.getElementById('logoFile');
    const logoPreview = document.getElementById('logoPreview');
    const carouselInput = document.getElementById('carouselFiles');
    const carouselPreview = document.getElementById('carouselPreview');
    const statusMessage = document.getElementById('statusMessage');

    function msg(text, success) {
        statusMessage.innerText = text;
        statusMessage.className = `status-msg ${success ? 'status-success' : 'status-error'}`;
        statusMessage.style.display = 'block';
        window.scrollTo(0,0);
    }

    document.addEventListener("DOMContentLoaded", () => {
        fetch('/api/data?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                if(data) {
                    document.getElementById('texteAccueil').value = data.texteAccueil || "";
                    document.getElementById('vieEgliseTexte').value = data.vieEgliseTexte || "";
                    document.getElementById('lienYouTube').value = data.lienYouTube || "";
                    document.getElementById('lienFacebook').value = data.lienFacebook || "";
                    document.getElementById('coordonneesBancaires').value = data.coordonneesBancaires || "";
                    document.getElementById('mobileMoney').value = data.mobileMoney || "";
                    
                    if(data.logoSrc) {
                        currentLogoSrc = data.logoSrc;
                        logoPreview.src = data.logoSrc;
                        logoPreview.style.display = 'block';
                    }
                    if(data.carouselImages && data.carouselImages.length > 0) {
                        currentCarouselImages = data.carouselImages;
                        carouselPreview.innerHTML = "";
                        data.carouselImages.forEach(url => {
                            const img = document.createElement('img');
                            img.src = url;
                            carouselPreview.appendChild(img);
                        });
                    }
                }
            });
    });

    logoInput.addEventListener('change', () => {
        if(logoInput.files && logoInput.files[0]) {
            const r = new FileReader();
            r.onload = (e) => { logoPreview.src = e.target.result; logoPreview.style.display='block'; };
            r.readAsDataURL(logoInput.files[0]);
        }
    });

    carouselInput.addEventListener('change', () => {
        carouselPreview.innerHTML = "";
        if(carouselInput.files) {
            Array.from(carouselInput.files).forEach(file => {
                const r = new FileReader();
                r.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    carouselPreview.appendChild(img);
                };
                r.readAsDataURL(file);
            });
        }
    });

    document.getElementById('adminForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        msg("Téléchargement et mise à jour en cours...", true);

        try {
            if(logoInput.files && logoInput.files[0]) {
                const fd = new FormData();
                fd.append('logoFile', logoInput.files[0]);
                const res = await fetch('/api/upload-logo', { method: 'POST', body: fd });
                const d = await res.json();
                if(d.src) currentLogoSrc = d.src;
            }

            if(carouselInput.files && carouselInput.files.length > 0) {
                const fd = new FormData();
                Array.from(carouselInput.files).forEach(file => {
                    fd.append('carouselFiles', file);
                });
                const res = await fetch('/api/upload-carousel', { method: 'POST', body: fd });
                const d = await res.json();
                if(d.srcs) currentCarouselImages = d.srcs;
            }

            const finalData = {
                logoSrc: currentLogoSrc,
                carouselImages: currentCarouselImages,
                texteAccueil: document.getElementById('texteAccueil').value,
                vieEgliseTexte: document.getElementById('vieEgliseTexte').value,
                lienYouTube: document.getElementById('lienYouTube').value,
                lienFacebook: document.getElementById('lienFacebook').value,
                coordonneesBancaires: document.getElementById('coordonneesBancaires').value,
                mobileMoney: document.getElementById('mobileMoney').value
            };

            const saveRes = await fetch('/api/save-data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(finalData)
            });
            const r = await saveRes.json();
            if(r.success) {
                msg("✅ Site mis à jour avec succès !", true);
            } else {
                msg("❌ Erreur d'enregistrement.", false);
            }
        } catch (err) {
            msg("❌ Erreur réseau.", false);
        }
    });
</script>
</body>
</html>
